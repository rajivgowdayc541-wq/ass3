<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 60" width="160" height="60">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Logo box with corner notch brackets -->
  <rect x="2" y="2" width="36" height="36" fill="none" stroke="#00e5b0" stroke-width="1.5"/>
  <!-- top-left corner accent -->
  <line x1="2" y1="2" x2="10" y2="2" stroke="#00e5b0" stroke-width="2.5"/>
  <line x1="2" y1="2" x2="2" y2="10" stroke="#00e5b0" stroke-width="2.5"/>
  <!-- bottom-right corner accent -->
  <line x1="38" y1="38" x2="30" y2="38" stroke="#00e5b0" stroke-width="2.5"/>
  <line x1="38" y1="38" x2="38" y2="30" stroke="#00e5b0" stroke-width="2.5"/>

  <!-- DH text inside box -->
  <text x="20" y="25" font-family="'Rajdhani', sans-serif" font-weight="700" font-size="16"
        fill="#00e5b0" text-anchor="middle" dominant-baseline="central" letter-spacing="1">DH</text>

  <!-- DIGITAL / HUNTERS stacked text -->
  <text x="52" y="16" font-family="'Rajdhani', sans-serif" font-weight="700" font-size="13"
        fill="#ffffff" letter-spacing="2">DIGITAL</text>
  <text x="52" y="32" font-family="'Rajdhani', sans-serif" font-weight="400" font-size="11"
        fill="#5a8a87" letter-spacing="3">HUNTERS</text>
</svg>
